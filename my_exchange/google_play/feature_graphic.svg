<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50" />
      <stop offset="50%" style="stop-color:#26A69A" />
      <stop offset="100%" style="stop-color:#2196F3" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="850" cy="80" r="180" fill="#FFFFFF" opacity="0.03"/>
  <circle cx="920" cy="420" r="250" fill="#FFFFFF" opacity="0.02"/>
  <circle cx="100" cy="450" r="160" fill="#FFFFFF" opacity="0.03"/>

  <!-- Left side - App Mockup -->
  <g filter="url(#shadow)">
    <!-- Phone body -->
    <rect x="80" y="45" width="220" height="410" rx="30" fill="#1E1E1E" stroke="#333" stroke-width="2"/>
    <!-- Phone screen -->
    <rect x="90" y="60" width="200" height="380" rx="20" fill="#FFFFFF"/>
    <!-- Status bar -->
    <rect x="90" y="60" width="200" height="30" rx="20" fill="#1976D2"/>
    <rect x="90" y="75" width="200" height="15" fill="#1976D2"/>
    <!-- App bar -->
    <rect x="90" y="90" width="200" height="44" fill="#FFFFFF"/>
    <rect x="90" y="90" width="200" height="44" fill="#1976D2" opacity="0.05"/>
    <text x="120" y="118" font-family="sans-serif" font-size="13" fill="#212121" font-weight="bold">Моя волюта</text>

    <!-- Stats card -->
    <rect x="100" y="142" width="180" height="90" rx="10" fill="url(#cardGrad)" stroke="#E3F2FD" stroke-width="1"/>
    <rect x="100" y="142" width="180" height="90" rx="10" fill="#1565C0" opacity="0.9"/>
    <text x="120" y="162" font-family="sans-serif" font-size="9" fill="#FFFFFF" opacity="0.8">Сегодня</text>
    <text x="120" y="180" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">12 операций</text>
    <text x="120" y="196" font-family="sans-serif" font-size="10" fill="#FFFFFF" opacity="0.8">Оборот: 145 000 сом</text>

    <!-- Operation card 1 -->
    <rect x="100" y="242" width="180" height="50" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <circle cx="120" cy="267" r="12" fill="#E8F5E9"/>
    <text x="116" y="271" font-family="sans-serif" font-size="8" fill="#4CAF50" font-weight="bold">↑</text>
    <text x="138" y="264" font-family="sans-serif" font-size="11" fill="#212121" font-weight="600">Покупка USD</text>
    <text x="138" y="280" font-family="sans-serif" font-size="9" fill="#757575">500 USD × 86.5</text>
    <text x="245" y="270" font-family="sans-serif" font-size="11" fill="#4CAF50" font-weight="bold">43 250 с</text>

    <!-- Operation card 2 -->
    <rect x="100" y="300" width="180" height="50" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <circle cx="120" cy="325" r="12" fill="#FFEBEE"/>
    <text x="116" y="329" font-family="sans-serif" font-size="8" fill="#F44336" font-weight="bold">↓</text>
    <text x="138" y="322" font-family="sans-serif" font-size="11" fill="#212121" font-weight="600">Продажа EUR</text>
    <text x="138" y="338" font-family="sans-serif" font-size="9" fill="#757575">200 EUR × 93.2</text>
    <text x="245" y="328" font-family="sans-serif" font-size="11" fill="#F44336" font-weight="bold">18 640 с</text>

    <!-- Bottom navigation -->
    <rect x="90" y="400" width="200" height="40" rx="0" fill="#FFFFFF"/>
    <rect x="90" y="420" width="200" height="20" fill="#FFFFFF"/>
    <!-- Nav icons -->
    <text x="107" y="430" font-family="sans-serif" font-size="10" fill="#1976D2" text-anchor="middle">⇄</text>
    <text x="152" y="430" font-family="sans-serif" font-size="10" fill="#1976D2" text-anchor="middle">⬡</text>
    <text x="197" y="430" font-family="sans-serif" font-size="10" fill="#1976D2" text-anchor="middle">$</text>
    <text x="242" y="430" font-family="sans-serif" font-size="10" fill="#1976D2" text-anchor="middle">📊</text>
    <text x="107" y="440" font-family="sans-serif" font-size="6" fill="#757575" text-anchor="middle">Операции</text>
    <text x="152" y="440" font-family="sans-serif" font-size="6" fill="#757575" text-anchor="middle">Касса</text>
    <text x="197" y="440" font-family="sans-serif" font-size="6" fill="#757575" text-anchor="middle">Валюты</text>
    <text x="242" y="440" font-family="sans-serif" font-size="6" fill="#757575" text-anchor="middle">Аналитика</text>
  </g>

  <!-- Right side - Text Content -->
  <text x="350" y="120" font-family="sans-serif" font-size="36" fill="#FFFFFF" font-weight="bold">My Exchange</text>
  <text x="350" y="155" font-family="sans-serif" font-size="18" fill="#FFFFFF" opacity="0.9">Профессиональное управление</text>
  <text x="350" y="180" font-family="sans-serif" font-size="18" fill="#FFFFFF" opacity="0.9">обменными операциями</text>

  <!-- Features list -->
  <g transform="translate(350, 220)">
    <!-- Feature 1 -->
    <rect x="0" y="0" width="30" height="30" rx="8" fill="#FFFFFF" opacity="0.15"/>
    <text x="8" y="20" font-family="sans-serif" font-size="14" fill="#FFFFFF">💱</text>
    <text x="42" y="20" font-family="sans-serif" font-size="15" fill="#FFFFFF" font-weight="600">Операции с валютами</text>
    <text x="42" y="38" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.7">Покупка и продажа с авторасчётом</text>

    <!-- Feature 2 -->
    <rect x="0" y="55" width="30" height="30" rx="8" fill="#FFFFFF" opacity="0.15"/>
    <text x="8" y="75" font-family="sans-serif" font-size="14" fill="#FFFFFF">💰</text>
    <text x="42" y="75" font-family="sans-serif" font-size="15" fill="#FFFFFF" font-weight="600">Управление кассой</text>
    <text x="42" y="93" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.7">Смены, остатки, внесение и выдача</text>

    <!-- Feature 3 -->
    <rect x="0" y="110" width="30" height="30" rx="8" fill="#FFFFFF" opacity="0.15"/>
    <text x="8" y="130" font-family="sans-serif" font-size="14" fill="#FFFFFF">📊</text>
    <text x="42" y="130" font-family="sans-serif" font-size="15" fill="#FFFFFF" font-weight="600">Аналитика и отчёты</text>
    <text x="42" y="148" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.7">Графики, рентабельность, загрузка</text>

    <!-- Feature 4 -->
    <rect x="0" y="165" width="30" height="30" rx="8" fill="#FFFFFF" opacity="0.15"/>
    <text x="8" y="185" font-family="sans-serif" font-size="14" fill="#FFFFFF">🔐</text>
    <text x="42" y="185" font-family="sans-serif" font-size="15" fill="#FFFFFF" font-weight="600">Безопасность</text>
    <text x="42" y="203" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.7">JWT-авторизация и аудит действий</text>
  </g>

  <!-- Accent line -->
  <rect x="350" y="440" width="300" height="3" rx="2" fill="url(#accentGrad)"/>

  <!-- Play Store badge text -->
  <text x="350" y="475" font-family="sans-serif" font-size="11" fill="#FFFFFF" opacity="0.6">Доступно в Google Play</text>
</svg>
