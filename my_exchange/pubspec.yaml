name: my_exchange
description: "Mobile app for currency exchange"
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  dio: ^5.4.0
  retrofit: ^4.0.3
  
  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # JSON Serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  
  # Navigation
  go_router: ^13.0.0
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Forms
  flutter_form_builder: ^10.3.0

  # Utils
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.6.4
  intl: ^0.20.2
  fl_chart: ^1.2.0
  url_launcher: ^6.3.0
  local_auth: ^3.0.1
  local_auth_android: ^2.0.9
  local_auth_darwin: ^2.0.3
  share_plus: ^12.0.2
  path_provider: ^2.1.6
  flutter_slidable: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  change_app_package_name: ^1.5.0
  rename_app: ^1.6.6

flutter:
  uses-material-design: true
  assets: 
    - assets/images/made_by_deo.png
    - assets/images/
    - assets/


config_name:
  name: "Моя валюта"